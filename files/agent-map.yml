---
# ~/.config/ai/agent-map.yml
#
# Managed by setup (tasks/09-ai-config.yml). Do not edit by hand; change the
# source in the setup repo instead.
#
# Single manifest of where each AI assistant on this machine keeps its
# configuration, and how it relates to the agent-neutral sources under
# ~/.config/ai/.
#
# A note on "tool-specific" config: several classes a tool presents as its own
# — memory, command/skill prompts, subagent definitions — are in reality
# portable prompt and guidance content that any capable agent could use. This
# map records their locations so they can be reused across tools and harvested
# into the shared hub, even where no common format lets setup sync them yet.
# Only genuinely mechanical config (instructions text, MCP servers) is synced;
# only genuinely tool-bound config (settings) is ignored outright.
#
# Sync methods:
#   link     — symlink the tool's file to the hub file (user scope; tools that
#              never rewrite the file in place).
#   import   — a stub that @imports the hub file (tools that rewrite their own
#              instruction file in place, e.g. Claude Code).
#   generate — render the hub mcp.json into the tool's own format via
#              ~/bin/ai-sync.
#   portable — a real location holding agent-neutral content (memory, command/
#              skill prompts, subagent definitions) the tool frames as its own
#              but which is reusable by any capable agent. Not auto-synced — no
#              common cross-tool format or location exists yet — so the path is
#              mapped for manual reuse and for harvesting into the hub
#              (AGENTS.md) or repo docs.
#   ignore   — genuinely nothing to sync: an app-managed store or no standalone
#              file (e.g. Cursor User Rules, per-tool settings).
#
# Config classes:
#   instructions — always-loaded guidance;  hub: ~/.config/ai/AGENTS.md  (synced)
#   mcp          — MCP server definitions;   hub: ~/.config/ai/mcp.json   (synced)
#   commands / skills / subagents / memory — portable prompt & guidance
#                  content; locations mapped (portable), not auto-synced.
#   settings     — genuinely per-tool (model, permissions, toggles); ignored.

# The two shared sources every sync method below refers to. Both are symlinks
# into the workspace repo's ai/ directory (readlink shows the target). Edit
# through these paths, never the per-tool copies.
hub:
  instructions: ~/.config/ai/AGENTS.md
  mcp: ~/.config/ai/mcp.json

# The vendor-neutral AGENTS.md convention (agents.md) is the backbone: the
# hub instructions file is itself an AGENTS.md, so tools that read that
# name natively need only a symlink — or nothing at all at project scope.
standards:
  agents_md:
    description: >-
      Vendor-neutral instructions filename. Read natively by a growing set of
      tools (Codex, Cursor, …). Because the hub instructions file is an
      AGENTS.md, those tools sync with a plain symlink or read it directly.

tools:

  claude-code:
    name: Claude Code
    user:
      instructions:
        path: ~/.claude/CLAUDE.md
        sync: import
        description: >-
          Global instructions. Claude edits this file when it saves memory, so
          use a one-line @import stub of the hub AGENTS.md, not a symlink.
      mcp:
        path: ~/.claude.json
        format: json
        key: mcpServers
        sync: generate
        description: User-scope MCP servers, merged under the mcpServers key.
      settings:
        path: ~/.claude/settings.json
        sync: ignore
      commands:
        path: ~/.claude/commands/
        sync: portable
        description: Slash-command prompts (Markdown) — reusable content.
      subagents:
        path: ~/.claude/agents/
        sync: portable
        description: Subagent definitions (prompt + tool scope) — reusable.
      skills:
        path: ~/.claude/skills/
        sync: portable
        description: Skills (SKILL.md + resources) — reusable content.
      memory:
        path: ~/.claude/projects/<project>/memory/
        sync: portable
        description: >-
          Per-project auto-memory, keyed by project path but stored under the
          home dir (not in the repo tree) — machine-local and Claude-only.
          Global twin: ~/.claude/memory/. Distilled guidance accumulates here;
          harvest into AGENTS.md or repo docs, as it neither syncs nor reaches
          other agents.
    project:
      instructions:
        path: CLAUDE.md
        sync: import
        description: Per-repo instructions; @import the repo's AGENTS.md.
      mcp:
        path: .mcp.json
        format: json
        key: mcpServers
        sync: generate
      commands:
        path: .claude/commands/
        sync: portable
      subagents:
        path: .claude/agents/
        sync: portable
      skills:
        path: .claude/skills/
        sync: portable

  openai-codex:
    name: OpenAI Codex CLI
    user:
      instructions:
        path: ~/.codex/AGENTS.md
        sync: link
        description: Global instructions; symlink to the hub AGENTS.md.
      mcp:
        path: ~/.codex/config.toml
        format: toml
        table: mcp_servers
        sync: generate
        description: >-
          MCP servers live under [mcp_servers.<name>] tables inside config.toml.
      settings:
        path: ~/.codex/config.toml
        sync: ignore
      commands:
        path: ~/.codex/prompts/
        sync: portable
        description: Custom prompts (Markdown) — reusable content.
    project:
      instructions:
        path: AGENTS.md
        sync: link
        description: Read natively; this is the standard filename.

  gemini-cli:
    name: Gemini CLI
    user:
      instructions:
        path: ~/.gemini/GEMINI.md
        sync: link
        description: >-
          Global instructions; symlink to the hub AGENTS.md. Alternative:
          set contextFileName to AGENTS.md in ~/.gemini/settings.json.
      mcp:
        path: ~/.gemini/settings.json
        format: json
        key: mcpServers
        sync: generate
      settings:
        path: ~/.gemini/settings.json
        sync: ignore
      commands:
        path: ~/.gemini/commands/
        sync: portable
        description: Custom commands (TOML) — reusable prompt content.
    project:
      instructions:
        path: GEMINI.md
        sync: link
      commands:
        path: .gemini/commands/
        sync: portable

  cursor:
    name: Cursor
    user:
      instructions:
        path: null
        sync: ignore
        description: >-
          User Rules are app-managed (stored in Cursor's settings, no file).
          Shared instructions reach Cursor at project scope via AGENTS.md.
      mcp:
        path: ~/.cursor/mcp.json
        format: json
        key: mcpServers
        sync: generate
    project:
      instructions:
        path: AGENTS.md
        sync: link
        description: Cursor reads AGENTS.md natively.
      mcp:
        path: .cursor/mcp.json
        format: json
        key: mcpServers
        sync: generate
      commands:
        path: .cursor/commands/
        sync: portable
        description: Command prompts (Markdown) — reusable content.

  github-copilot:
    name: GitHub Copilot
    user:
      instructions:
        path: null
        sync: ignore
        description: >-
          Personal instructions live in IDE user settings, not a standalone
          file. Shared instructions reach Copilot at project scope.
      mcp:
        path: null
        sync: ignore
        description: >-
          MCP is configured in the editor (e.g. VS Code mcp.json); the path
          varies by editor and OS, so it is not machine-synced here.
    project:
      instructions:
        path: .github/copilot-instructions.md
        sync: import
        description: Point the repo's Copilot instructions at its AGENTS.md.
      commands:
        path: .github/prompts/
        sync: portable
        description: Prompt files (*.prompt.md) — reusable content.
      subagents:
        path: .github/chatmodes/
        sync: portable
        description: Custom chat modes (*.chatmode.md) — reusable content.
...
