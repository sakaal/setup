---
# setup.yaml — main bootstrap playbook.
#
# Invoked by setup.sh once prerequisites are installed and pass-cli is
# authenticated. Discovers items in the Proton Pass "Setup Keys" vault
# and deploys them to the operator's machine, then deploys the
# workspace manifest and clones the listed repos.

- name: Workspace bootstrap
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    home_dir: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Discover Setup Keys items
      ansible.builtin.import_tasks: tasks/01-discover.yml
      tags: [discover, always]

    - name: Deploy SSH keypairs
      ansible.builtin.import_tasks: tasks/02-ssh-keys.yml
      tags: [ssh]

    - name: Deploy GitHub PAT
      ansible.builtin.import_tasks: tasks/03-github-pat.yml
      tags: [github]

    - name: Deploy Ansible Vault password identity
      ansible.builtin.import_tasks: tasks/04-vault-password.yml
      tags: [ansible-vault]

    - name: Deploy ~/workspace working tree
      ansible.builtin.import_tasks: tasks/05-workspace.yml
      tags: [workspace]

    - name: Clone workspace repos
      ansible.builtin.import_tasks: tasks/06-repos.yml
      tags: [repos]

...
