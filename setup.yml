---
# setup.yml — main bootstrap playbook.
#
# Invoked by setup.sh once prerequisites are installed and pass-cli is
# authenticated. Discovers items in the Proton Pass "Setup Keys" vault
# and deploys them to the operator's machine, then deploys the
# workspace manifest and clones the listed repos.

- name: Workspace bootstrap
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    home_dir: "{{ lookup('env', 'HOME') }}"
    # Workspace manifest repository. setup.sh passes this via -e (extra-vars,
    # highest precedence) from its optional positional argument; the default
    # here is what a direct `ansible-playbook` invocation gets.
    workspace_repo: "git@github.com:sakaal/workspace.git"
    # Directory under $HOME where the workspace repo lands. Defaults to the
    # repo's basename (minus .git, like `git clone`); override with
    # `-e workspace_dir=<name>` (setup.sh exposes this as the WORKSPACE_DIR
    # env var) when the remote repo's name can't be your preferred local
    # directory name. Extra-vars outrank this play var, so the override wins.
    workspace_dir: >-
      {{ workspace_repo
         | regex_replace('/+$', '')
         | regex_replace('\.git$', '')
         | regex_replace('^.*[/:]', '') }}

  tasks:
    - name: Validate the derived workspace directory name
      ansible.builtin.assert:
        that:
          - workspace_dir | length > 0
        fail_msg: >-
          workspace_repo "{{ workspace_repo }}" does not yield a usable
          directory name (basename minus .git). Pass a normal repo URL,
          e.g. …/my-projects.git.
      tags: [always]

    - name: Discover Setup Keys items
      ansible.builtin.import_tasks: tasks/01-discover.yml
      tags: [discover, always]

    - name: Deploy SSH keypairs
      ansible.builtin.import_tasks: tasks/02-ssh-keys.yml
      tags: [ssh]

    - name: Deploy GitHub PAT
      ansible.builtin.import_tasks: tasks/03-github-pat.yml
      tags: [github]

    - name: Deploy Ansible Vault password identity
      ansible.builtin.import_tasks: tasks/04-vault-password.yml
      tags: [ansible-vault]

    - name: Configure local git settings
      ansible.builtin.import_tasks: tasks/05-git-config.yml
      tags: [git-config]

    - name: Deploy ~/{{ workspace_dir }} working tree
      ansible.builtin.import_tasks: tasks/06-workspace.yml
      tags: [workspace]

    - name: Clone workspace repos
      ansible.builtin.import_tasks: tasks/07-repos.yml
      tags: [repos]

    - name: Configure shell environment baseline
      ansible.builtin.import_tasks: tasks/08-shell-env.yml
      tags: [shell-env]

    - name: Install AI assistants
      ansible.builtin.import_tasks: tasks/09-ai-tools.yml
      tags: [ai]

    - name: Configure AI assistants (hub + sync)
      ansible.builtin.import_tasks: tasks/09-ai-config.yml
      tags: [ai]

...
