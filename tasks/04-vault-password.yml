---
# 04-vault-password.yml — deploy the Ansible Vault password identity.
#
# For every item in setup_vault_pass_titles (Pass items prefixed
# `vault_pass-`):
#   - Vault ID = title with `vault_pass-` prefix stripped
# Then:
#   - Deploy ~/.ansible/vault-password-client.sh (parameterized; reads each
#     password from Pass on every ansible-vault invocation, so nothing
#     stays at rest beyond what's already in Pass)
#   - Update ~/.ansible.cfg via community.general.ini_file:
#       [defaults]
#       vault_identity_list = id1@~/.ansible/vault-password-client.sh,
#                             id2@~/.ansible/vault-password-client.sh, ...
#     (one entry per discovered vault ID; preserves any other config)

- name: Stage 04 — Ansible Vault password (skipped if no items in Pass)
  when: setup_vault_pass_titles | length > 0
  block:
    - name: Compute vault IDs (strip vault_pass- prefix)
      ansible.builtin.set_fact:
        vault_ids: "{{ setup_vault_pass_titles | map('regex_replace', '^vault_pass-', '') | list }}"

    - name: Build vault_identity_list value for ansible.cfg
      ansible.builtin.set_fact:
        vault_identity_list_value: >-
          {{
            vault_ids
            | map('regex_replace', '^(.*)$', '\1@' ~ home_dir ~ '/.ansible/vault-password-client.sh')
            | join(', ')
          }}

    - name: Ensure ~/.ansible directory exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.ansible"
        state: directory
        mode: '0700'

    - name: Deploy vault-password-client.sh
      ansible.builtin.template:
        src: vault-password-client.sh.j2
        dest: "{{ home_dir }}/.ansible/vault-password-client.sh"
        mode: '0700'

    - name: Set vault_identity_list in ~/.ansible.cfg (preserve other config)
      community.general.ini_file:
        path: "{{ home_dir }}/.ansible.cfg"
        section: defaults
        option: vault_identity_list
        value: "{{ vault_identity_list_value }}"
        create: true
        mode: '0600'

    - name: Stage 04 summary
      ansible.builtin.debug:
        msg:
          - "Vault IDs registered: {{ vault_ids }}"
          - "Each maps to: {{ home_dir }}/.ansible/vault-password-client.sh (script-based, fetches from Pass)"

...
