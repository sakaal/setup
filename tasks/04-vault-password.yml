---
# 04-vault-password.yml — deploy the Ansible Vault password identity.
#
# For every item in setup_vault_pass_titles (Pass items prefixed
# `vault_pass-`):
#   - Vault ID = title with `vault_pass-` prefix stripped
# Then:
#   - Deploy ~/.ansible/vault-password-client.sh (parameterized; reads
#     each password from Pass on every ansible-vault invocation, so
#     nothing stays at rest beyond what's already in Pass)
#   - Merge our discovered vault IDs into ~/.ansible.cfg's
#     vault_identity_list (in [defaults]):
#       * Existing entries for IDs we don't manage → preserved untouched.
#       * Existing entries for IDs we do manage → re-pointed at our
#         client script (so script-based fetch wins for our scope).
#       * IDs we manage that aren't yet in the list → appended.
#     This is the safe-idempotent semantic — never clobber unrelated
#     vault IDs the operator may have configured for other contexts.

- name: Stage 04 — Ansible Vault password (skipped if no items in Pass)
  when: setup_vault_pass_titles | length > 0
  block:
    - name: Compute vault IDs (strip vault_pass- prefix)
      ansible.builtin.set_fact:
        vault_ids: "{{ setup_vault_pass_titles | map('regex_replace', '^vault_pass-', '') | list }}"

    - name: Ensure ~/.ansible directory exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.ansible"
        state: directory
        mode: '0700'

    - name: Deploy vault-password-client.sh
      ansible.builtin.template:
        src: vault-password-client.sh.j2
        dest: "{{ home_dir }}/.ansible/vault-password-client.sh"
        mode: '0700'

    - name: Read existing vault_identity_list from ~/.ansible.cfg (if any)
      ansible.builtin.set_fact:
        existing_vault_list: >-
          {{ lookup('ansible.builtin.ini',
                    'vault_identity_list',
                    section='defaults',
                    file=(home_dir ~ '/.ansible.cfg'),
                    default='') }}

    - name: Merge our IDs into existing vault_identity_list (preserve unrelated entries)
      ansible.builtin.command:
        cmd: python3 -
        stdin: |
          import os, re, sys
          existing = os.environ.get('EXISTING', '').strip()
          our_ids = [s for s in os.environ.get('OUR_IDS', '').split() if s]
          script = os.environ.get('SCRIPT_PATH', '')

          # Preserve order of existing entries by parsing into an ordered dict.
          entries = {}  # id -> "id@path"
          for raw in [e.strip() for e in existing.split(',') if e.strip()]:
              m = re.match(r'^([^@]+)@(.+)$', raw)
              if m:
                  entries[m.group(1)] = raw
              else:
                  # Malformed entry — keep verbatim, indexed by itself
                  entries[raw] = raw

          # Override (or append) the IDs we manage so they point at our client script.
          for vid in our_ids:
              entries[vid] = f'{vid}@{script}'

          sys.stdout.write(', '.join(entries.values()))
      environment:
        EXISTING: "{{ existing_vault_list }}"
        OUR_IDS: "{{ vault_ids | join(' ') }}"
        SCRIPT_PATH: "{{ home_dir }}/.ansible/vault-password-client.sh"
      register: merged_vault_list
      changed_when: false

    - name: Set merged vault_identity_list in ~/.ansible.cfg
      community.general.ini_file:
        path: "{{ home_dir }}/.ansible.cfg"
        section: defaults
        option: vault_identity_list
        value: "{{ merged_vault_list.stdout }}"
        create: true
        mode: '0600'

    - name: Stage 04 summary
      ansible.builtin.debug:
        msg:
          - "Vault IDs we manage: {{ vault_ids }}"
          - "Final vault_identity_list: {{ merged_vault_list.stdout }}"

...
