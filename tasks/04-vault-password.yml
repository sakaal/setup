---
# 04-vault-password.yml — deploy the Ansible Vault password identity.
#
# For every item in setup_vault_pass_titles (Pass items prefixed
# `vault_pass-`):
#   - Vault ID = title with `vault_pass-` prefix stripped
# Then:
#   - Deploy ~/.ansible/vault-password-client.sh (parameterized; reads
#     each password from Pass on every ansible-vault invocation, so
#     nothing stays at rest beyond what's already in Pass)
#   - Merge into ~/.ansible.cfg's vault_identity_list (in [defaults])
#     from three sources, every ID listed exactly once:
#       * Existing entries already in vault_identity_list → preserved
#         untouched (highest precedence; never clobber operator state).
#       * ~/.vault_pass-<id> files in $HOME → added for any <id> not
#         already in the list, pointing at the file itself
#         (file-based, the convention used for non-personal scopes).
#       * vault_pass-<id> items in Pass `Setup Keys` → set/replace the
#         entry for <id> to point at our client script (script-based
#         fetch from Pass, our scope's convention).
#     Conflicts: Pass items always win for IDs we manage; file-based
#     entries fill in only IDs no one else has claimed.

- name: Stage 04 — Ansible Vault password (skipped if no items in Pass)
  when: setup_vault_pass_titles | length > 0
  block:
    - name: Compute vault IDs (strip vault_pass- prefix)
      ansible.builtin.set_fact:
        vault_ids: "{{ setup_vault_pass_titles | map('regex_replace', '^vault_pass-', '') | list }}"

    - name: Ensure ~/.ansible directory exists
      ansible.builtin.file:
        path: "{{ home_dir }}/.ansible"
        state: directory
        mode: '0700'

    - name: Deploy vault-password-client.sh
      ansible.builtin.template:
        src: vault-password-client.sh.j2
        dest: "{{ home_dir }}/.ansible/vault-password-client.sh"
        mode: '0700'

    - name: Read existing vault_identity_list from ~/.ansible.cfg (if any)
      ansible.builtin.set_fact:
        existing_vault_list: >-
          {{ lookup('ansible.builtin.ini',
                    'vault_identity_list',
                    section='defaults',
                    file=(home_dir ~ '/.ansible.cfg'),
                    default='') }}

    - name: Merge existing list, ~/.vault_pass-* files, and our Pass IDs
      ansible.builtin.command:
        cmd: python3 -
        stdin: |
          import glob, os, re, sys
          home = os.environ.get('HOME_DIR', '')
          existing = os.environ.get('EXISTING', '').strip()
          our_ids = [s for s in os.environ.get('OUR_IDS', '').split() if s]
          script = os.environ.get('SCRIPT_PATH', '')

          # 1. Seed with existing entries, preserving original order.
          entries = {}  # id -> "id@path"
          for raw in [e.strip() for e in existing.split(',') if e.strip()]:
              m = re.match(r'^([^@]+)@(.+)$', raw)
              if m:
                  entries[m.group(1)] = raw
              else:
                  # Malformed entry — keep verbatim, indexed by itself
                  entries[raw] = raw

          # 2. Add file-based entries for ~/.vault_pass-<id> files that
          #    aren't already in the list. The vault id is the suffix
          #    after `.vault_pass-`. We register the entry with `~/`
          #    rather than the absolute path so cfg stays portable.
          for path in sorted(glob.glob(os.path.join(home, '.vault_pass-*'))):
              name = os.path.basename(path)
              vid = name[len('.vault_pass-'):]
              if not vid:
                  continue
              if vid not in entries:
                  entries[vid] = f'{vid}@~/{name}'

          # 3. Set/replace entries for IDs we manage (Pass items) to
          #    point at our client script. This wins over both existing
          #    entries and file-based entries for the same id.
          for vid in our_ids:
              entries[vid] = f'{vid}@{script}'

          sys.stdout.write(', '.join(entries.values()))
      environment:
        HOME_DIR: "{{ home_dir }}"
        EXISTING: "{{ existing_vault_list }}"
        OUR_IDS: "{{ vault_ids | join(' ') }}"
        SCRIPT_PATH: "{{ home_dir }}/.ansible/vault-password-client.sh"
      register: merged_vault_list
      changed_when: false

    - name: Set merged vault_identity_list in ~/.ansible.cfg
      community.general.ini_file:
        path: "{{ home_dir }}/.ansible.cfg"
        section: defaults
        option: vault_identity_list
        value: "{{ merged_vault_list.stdout }}"
        create: true
        mode: '0600'

    - name: Stage 04 summary
      ansible.builtin.debug:
        msg:
          - "Vault IDs we manage: {{ vault_ids }}"
          - "Final vault_identity_list: {{ merged_vault_list.stdout }}"

...
