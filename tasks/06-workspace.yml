---
# 06-workspace.yml — deploy ~/{{ workspace_dir }} as a working tree of the
# workspace manifest repo (`workspace_repo`; the default is overridable via
# setup.sh's positional argument). Three-case logic on the existence and
# remote of its .git:
#
#   Case 1: exists and origin matches workspace_repo
#           → trust; fetch (quiet); surface drift via `git status`.
#   Case 2: exists but origin points elsewhere
#           → fatal halt; do not modify.
#   Case 3: .git absent (regardless of whether the directory
#           itself exists or has unrelated content already)
#           → lay non-destructively: mkdir if needed (preserve existing
#             dir's mode), then git init + remote add + fetch + checkout -B
#             of the remote's default branch. The checkout step refuses
#             to overwrite untracked local files that would conflict
#             with files tracked on the remote's default branch, so any
#             content stays put. Sibling directories are untouched —
#             the workspace repo's whitelist .gitignore makes them
#             invisible to git tracking after deployment.

- name: Stat ~/{{ workspace_dir }}/.git
  ansible.builtin.stat:
    path: "{{ home_dir }}/{{ workspace_dir }}/.git"
  register: workspace_git_stat

# The workspace repo's default branch, asked from the remote itself (repos
# aren't all 'main'). Read-only query straight against the URL, so it works
# before any local clone exists; falls back to 'main' if the remote can't say.
- name: Ask the remote for the workspace repo's default branch
  ansible.builtin.command:
    cmd: git ls-remote --symref "{{ workspace_repo }}" HEAD
  register: workspace_head
  changed_when: false
  failed_when: false
  check_mode: false

- name: Resolve workspace branch (fallback main)
  ansible.builtin.set_fact:
    workspace_branch: >-
      {{ (workspace_head.stdout | regex_search('ref: refs/heads/(\S+)', '\1') | first)
         if (workspace_head.rc == 0 and 'refs/heads/' in workspace_head.stdout)
         else 'main' }}

- name: Get current ~/{{ workspace_dir }} origin URL (when .git exists)
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" remote get-url origin
  register: workspace_origin
  changed_when: false
  failed_when: false
  when: workspace_git_stat.stat.exists

# Normalize any git remote (scp-like git@host:owner/repo.git, ssh://…,
# https://…, with or without .git or a trailing slash) down to a canonical
# host/owner/repo form, so the desired repo and the existing origin compare
# equal regardless of transport. The transform is written once and applied to
# both operands via the loop. Trailing slashes are stripped *before* the .git
# suffix, so a URL carrying both (…/repo.git/) still normalizes cleanly.
- name: Normalize desired repo and existing origin for comparison
  ansible.builtin.set_fact:
    workspace_norm: >-
      {{ workspace_norm | default({}) | combine({
           item.key: (item.value
             | regex_replace('^\w+://', '')
             | regex_replace('^[^@/]+@', '')
             | regex_replace('^([^/:]+):', '\1/')
             | regex_replace('/+$', '')
             | regex_replace('\.git$', '')) }) }}
  loop:
    - { key: repo,   value: "{{ workspace_repo }}" }
    - { key: origin, value: "{{ workspace_origin.stdout | default('') }}" }
  loop_control:
    label: "{{ item.key }}"
  when: workspace_git_stat.stat.exists

- name: Determine if the existing origin matches the desired workspace repo
  ansible.builtin.set_fact:
    workspace_remote_ok: >-
      {{
        workspace_origin is defined
        and workspace_origin.rc | default(1) == 0
        and workspace_norm.repo == workspace_norm.origin
      }}
  when: workspace_git_stat.stat.exists

# Case 2 — fatal on unexpected remote.
- name: Halt — ~/{{ workspace_dir }}/.git points to an unexpected remote
  ansible.builtin.fail:
    msg: |
      ~/{{ workspace_dir }}/.git exists but origin does not match the requested workspace repo.
        Current origin: {{ workspace_origin.stdout | default('(none)') }}
        Expected:       {{ workspace_repo }} (any transport; SSH or HTTPS, with or without .git)
      Refusing to modify. Investigate and resolve manually before re-running.
  when:
    - workspace_git_stat.stat.exists
    - not (workspace_remote_ok | default(false))

# Case 1 — trust, fetch quietly. Auto-fast-forward only when the working
# copy is clean and on the default branch and FF is possible; otherwise
# accept the working copy as-is (silent — operator owns local state).
- name: Fetch + maybe fast-forward ~/{{ workspace_dir }}
  ansible.builtin.shell:
    cmd: |
      cd "{{ home_dir }}/{{ workspace_dir }}"
      git fetch --quiet origin "{{ workspace_branch }}" 2>/dev/null || exit 0
      git diff-index --quiet HEAD 2>/dev/null || exit 0
      [[ "$(git symbolic-ref --short HEAD 2>/dev/null)" == "{{ workspace_branch }}" ]] || exit 0
      git merge-base --is-ancestor HEAD "origin/{{ workspace_branch }}" 2>/dev/null || exit 0
      [[ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/{{ workspace_branch }}")" ]] && exit 0
      git merge --ff-only "origin/{{ workspace_branch }}" --quiet
      echo ff-applied
    executable: /bin/bash
  register: workspace_ff
  changed_when: workspace_ff.stdout == "ff-applied"
  when:
    - workspace_git_stat.stat.exists
    - workspace_remote_ok | default(false)

# Case 3 — lay non-destructively onto the workspace dir.
- name: Ensure ~/{{ workspace_dir }} exists (no mode change if already there)
  ansible.builtin.file:
    path: "{{ home_dir }}/{{ workspace_dir }}"
    state: directory
  when: not workspace_git_stat.stat.exists

- name: git init in ~/{{ workspace_dir }} (case 3)
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" init
  when: not workspace_git_stat.stat.exists
  changed_when: true

- name: Add origin remote (case 3)
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" remote add origin "{{ workspace_repo }}"
  when: not workspace_git_stat.stat.exists
  changed_when: true

- name: Fetch {{ workspace_branch | default('the default branch') }} from origin (case 3)
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" fetch origin "{{ workspace_branch }}"
  when: not workspace_git_stat.stat.exists
  changed_when: true

- name: Check out the default branch (lays files non-destructively)
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" checkout -B "{{ workspace_branch }}" "origin/{{ workspace_branch }}"
  when: not workspace_git_stat.stat.exists
  changed_when: true

- name: Set upstream tracking on the default branch
  ansible.builtin.command:
    cmd: git -C "{{ home_dir }}/{{ workspace_dir }}" branch --set-upstream-to="origin/{{ workspace_branch }}" "{{ workspace_branch }}"
  when: not workspace_git_stat.stat.exists
  changed_when: true

...
