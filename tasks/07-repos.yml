---
# 07-repos.yml — ensure each repo from workspace.repos is cloned at
# ~/{{ workspace_dir }}/<name>/, and apply the manifest's optional git
# identity: a top-level `config.user` → git *global* config; a per-repo
# `config.user` → that repo's *local* config (in 07-repos-one.yml). Both are
# optional and, when absent, setup leaves the corresponding git config
# untouched. Each field under `config.user` maps to `user.<field>` (name,
# email, …). The identity values live only in the private workspace repo;
# this public repo names the fields, never their contents. Per-entry clone
# behavior:
#
#   target absent              → clone (using `version` if specified,
#                                 else the remote's default branch)
#   target is a git repo,
#     remote matches manifest  → skip silently (already done)
#   target is a git repo,
#     remote differs           → log a warning, skip (don't clobber)
#   target dir exists, no .git → log a warning, skip (don't clobber)
#
# Per safe-idempotent stance, only the "absent → clone" case takes
# any action. All other cases preserve existing local state.

- name: Stat ~/{{ workspace_dir }}/workspace.repos
  ansible.builtin.stat:
    path: "{{ home_dir }}/{{ workspace_dir }}/workspace.repos"
  register: manifest_stat

- name: Stage 07 — clone repos from manifest (skipped if manifest absent)
  when: manifest_stat.stat.exists
  block:
    - name: Read workspace.repos manifest
      ansible.builtin.include_vars:
        file: "{{ home_dir }}/{{ workspace_dir }}/workspace.repos"
        name: workspace_manifest

    # Top-level config.user → git global identity. Empty/absent → untouched.
    - name: Resolve top-level identity from the manifest (may be empty)
      ansible.builtin.set_fact:
        ws_global_user: "{{ (workspace_manifest.config | default({})).user | default({}) }}"

    - name: Set git global identity from the manifest (only fields present)
      community.general.git_config:
        scope: global
        name: "user.{{ item.key }}"
        value: "{{ item.value }}"
      loop: "{{ ws_global_user | dict2items }}"
      loop_control:
        label: "user.{{ item.key }}"
      when: ws_global_user | length > 0

    - name: Process each manifest entry
      ansible.builtin.include_tasks: 07-repos-one.yml
      loop: "{{ workspace_manifest.repositories | default({}) | dict2items }}"
      loop_control:
        loop_var: manifest_entry
        label: "{{ manifest_entry.key }}"

    - name: Stage 07 summary
      ansible.builtin.debug:
        msg:
          - "Workspace repos in manifest: {{ workspace_manifest.repositories | default({}) | length }}"
          - >-
            Global git identity from manifest:
            {{ 'set (' ~ (ws_global_user.keys() | list | join(', ')) ~ ')'
               if ws_global_user | length > 0 else 'not set — left untouched' }}

...
