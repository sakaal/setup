---
# 08-shell-env.yml — machine-local shell environment: ~/.local/bin on PATH, and
# the GitHub Copilot CLI pointed at the shared AI hub. Both are plain shell env,
# written to .zshenv (zsh) and .bashrc (bash) so they persist across shells and
# take effect for EVERY zsh — login, interactive, and non-interactive alike, so
# a tool that spawns a plain `zsh -c` still gets them. Not set once by Ansible;
# each is an idempotent blockinfile marker region with a shell-side guard so the
# value never duplicates across nested shells.
#
# ~/.local/bin is the conventional drop point for user-local binaries — pipx
# (hence Ansible), pass-cli on Linux, `pip --user`, and many `curl | bash`
# installers (the Claude Code and Codex CLIs among them) place executables there
# but do NOT put it on PATH, so without this they install yet are "command not
# found". On macOS, /etc/zprofile's path_helper reorders PATH at login, so in a
# login shell ~/.local/bin lands after the system paths — that shifts priority
# only for a name it shares with a system/brew tool, not for the uniquely-named
# AI CLIs.

- name: Ensure ~/.local/bin is on PATH (zsh and bash startup files)
  ansible.builtin.blockinfile:
    path: "{{ home_dir }}/{{ item }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED — user-local bin on PATH"
    block: |
      # Ensure user-local binaries (Claude Code CLI, pipx, pass-cli, pip --user, …) are on PATH
      case ":$PATH:" in
        *":$HOME/.local/bin:"*) ;;
        *) export PATH="$HOME/.local/bin:$PATH" ;;
      esac
  loop:
    - .zshenv
    - .bashrc

- name: Point the GitHub Copilot CLI at the shared AI hub (zsh and bash startup files)
  ansible.builtin.blockinfile:
    path: "{{ home_dir }}/{{ item }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED — Copilot CLI custom-instructions dir"
    block: |
      # GitHub Copilot CLI reads AGENTS.md and .github/instructions/ from these dirs
      case ",$COPILOT_CUSTOM_INSTRUCTIONS_DIRS," in
        *",$HOME/.config/ai,"*) ;;
        *) export COPILOT_CUSTOM_INSTRUCTIONS_DIRS="${COPILOT_CUSTOM_INSTRUCTIONS_DIRS:+$COPILOT_CUSTOM_INSTRUCTIONS_DIRS,}$HOME/.config/ai" ;;
      esac
  loop:
    - .zshenv
    - .bashrc
...
