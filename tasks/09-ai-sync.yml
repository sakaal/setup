---
# 09-ai-sync.yml — wire each present tool to the hub and render generated
# formats, driven by the manifest (ai_map). Imported by 09-ai-config.yml.
#
# link/import entries (here): point a tool's own path at a hub source,
# non-destructively — absent/empty/already-ours → act/noop; real content →
# recorded and halted, never clobbered.
# generate/wrap entries: rendered by ~/bin/ai-sync (deployed and run below).
# ~/bin/ai-harvest (harvest-lane catalog) and ~/bin/ai-distill (the
# distillation prepare/accept bookends) are deployed alongside but never run
# by the playbook — harvesting and distillation are curation-time actions,
# not part of the bootstrap.
#
# Only user-scope entries are wired. Workspace-scope entries in the manifest
# document locations applied at the workspace root (inherited by the projects
# inside), not by setup.

- name: Reset the wiring-conflict accumulator
  ansible.builtin.set_fact:
    ai_wire_conflicts: []

- name: Wire each user-scope link/import entry (distribute lane only)
  ansible.builtin.include_tasks: 09-ai-wire-one.yml
  loop: >-
    {{ ai_map.entries.distribute
       | selectattr('scope', 'match', 'user($|:)')
       | selectattr('sync', 'in', ['link', 'import'])
       | list }}
  loop_control:
    loop_var: entry
    label: "{{ entry.tool }}:{{ entry.class }}"

- name: Halt on wiring conflicts (nothing was overwritten)
  ansible.builtin.fail:
    msg: >-
      Refusing to overwrite existing tool file(s) that hold content and are not
      the shared link/stub: {{ ai_wire_conflicts | join(', ') }}. Reconcile each
      (move its content into the workspace repo's ai/, remove the local path)
      and re-run — or skip with --skip-tags ai-sync.
  when: ai_wire_conflicts | length > 0

- name: Ensure ~/bin exists
  ansible.builtin.file:
    path: "{{ home_dir }}/bin"
    state: directory
    mode: "0755"

- name: Deploy the format renderer (~/bin/ai-sync)
  ansible.builtin.copy:
    src: ai-sync
    dest: "{{ home_dir }}/bin/ai-sync"
    mode: "0755"

- name: Deploy the harvest collector (~/bin/ai-harvest)
  ansible.builtin.copy:
    src: ai-harvest
    dest: "{{ home_dir }}/bin/ai-harvest"
    mode: "0755"

- name: Deploy the distillation bookends (~/bin/ai-distill)
  ansible.builtin.copy:
    src: ai-distill
    dest: "{{ home_dir }}/bin/ai-distill"
    mode: "0755"

- name: Ensure the AI shared-data directory exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.local/share/ai"
    state: directory
    mode: "0755"

# ai-distill's identifier screen (§7 req 5.a) recognizes ordinary known words so
# it does not redact them as identifiers. The word set is layered: the vendored,
# integrity-pinned SCOWL English list, plus cspell's curated software-terms list
# (ssh/sdk/ansible/…); each NOTICE carries its licence.
- name: Deploy the identifier-screen wordlists (SCOWL + cspell) and notices
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ home_dir }}/.local/share/ai/{{ item.dest }}"
    mode: "0644"
  loop:
    - {src: ai-wordlist.txt.gz, dest: wordlist.txt.gz}
    - {src: ai-wordlist.NOTICE, dest: wordlist.NOTICE}
    - {src: ai-terms.txt, dest: terms.txt}
    - {src: ai-terms.NOTICE, dest: terms.NOTICE}

- name: Render generated formats into each present tool
  ansible.builtin.command:
    cmd: "{{ home_dir }}/bin/ai-sync"
  register: ai_sync_run
  changed_when: "'changed:' in ai_sync_run.stdout"

- name: Render report
  ansible.builtin.debug:
    msg: "{{ ai_sync_run.stdout_lines }}"
  when: ai_sync_run.stdout_lines | default([]) | length > 0
...
