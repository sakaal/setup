---
# 09-ai-tool-claude-code.yml — install Claude Code. Official native installer
# (not Homebrew): the script lands in ~/.local/share/claude and symlinks
# ~/.local/bin/claude — the user-isolated layout this repo prefers, on macOS and
# Linux alike. The tool self-updates, so `creates:` installs it only when that
# binary is absent. The pipe runs under bash with `set -o pipefail` so a failed
# download fails the task instead of being masked by the installer's exit
# status. Imported by 09-ai-tools.yml.

- name: Install Claude Code (official native installer)
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
    creates: "{{ home_dir }}/.local/bin/claude"
  tags: [ai-tools]
...
